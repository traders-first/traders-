<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Traders - Profil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { margin: 0; background-color: #f8f8f8; color: #000; padding-bottom: 80px; }

        /* En-tête Profil */
        .profile-header {
            background-color: #00A651; /* Noir changé en Vert */
            color: #fff;
            padding: 40px 20px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-info i { font-size: 50px; }
        .phone-num { font-size: 18px; font-weight: bold; }
        .level-badge {
            background: #fff;
            color: #00A651; /* Texte badge en vert */
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 5px;
            display: inline-block;
        }

        /* Actions rapides */
        .quick-actions {
            display: flex;
            justify-content: space-around;
            background: #fff;
            margin: -20px 20px 20px;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .action-item { text-decoration: none; color: #333; text-align: center; font-size: 12px; }
        .action-item i { font-size: 20px; display: block; margin-bottom: 5px; color: #00A651; /* Icônes changées en Vert */ }

        /* Section Solde */
        .wallet-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 20px;
        }
        .wallet-card {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #eee;
            text-decoration: none;
            color: inherit;
        }
        .wallet-card h3 { margin: 0; font-size: 15px; font-weight: bold; }
        .wallet-card p { margin: 5px 0 0; font-size: 11px; color: #666; }

        /* Grille des Services */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            margin-top: 10px;
        }
        .service-item {
            text-align: center;
            text-decoration: none;
            color: #333;
            font-size: 10px;
            cursor: pointer;
        }
        .service-icon {
            width: 45px;
            height: 45px;
            background: #fff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 18px;
            border: 1px solid #eee;
            color: #00A651; /* Icônes des services changées en Vert */
        }

        /* Navigation Basse */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #fff;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #ddd;
        }
        .nav-item { text-decoration: none; color: #888; text-align: center; font-size: 11px; }
        .nav-item.active { color: #00A651; font-weight: bold; } /* Menu actif changé en Vert */
        .nav-icon { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="user-info">
            <i class="fas fa-user-circle"></i>
            <div>
                <div class="phone-num" id="displayPhone">Chargement...</div>
                <div class="level-badge" id="displayVIP">VIP 0</div>
            </div>
        </div>
    </div>

    <div class="quick-actions">
        <a href="recharge.html" class="action-item"><i class="fas fa-wallet"></i>Recharger</a>
        <a href="retrait.html" class="action-item"><i class="fas fa-hand-holding-usd"></i>Retrait</a>
        <a href="historique.html" class="action-item"><i class="fas fa-list-ul"></i>Historique</a>
    </div>

    <div class="wallet-section">
        <a href="historique.html" class="wallet-card">
            <h3 id="walletBalance">0 FC</h3>
            <p>Solde du compte ></p>
        </a>
        <a href="mes-produits.html" class="wallet-card">
            <h3 id="walletEarnings">0 FC</h3>
            <p>Revenus cumulés ></p>
        </a>
    </div>

    <div class="services-grid">
        <a href="a-propos.html" class="service-item"><div class="service-icon"><i class="fas fa-info-circle"></i></div>À propos</a>
        <a href="regles.html" class="service-item"><div class="service-icon"><i class="fas fa-file-alt"></i></div>Règles</a>
        <a href="https://t.me/serv0754" class="service-item"><div class="service-icon"><i class="fas fa-headset"></i></div>Service client</a>
        <a href="#" class="service-item"><div class="service-icon"><i class="fas fa-download"></i></div>App</a>
        <a href="#" class="service-item"><div class="service-icon"><i class="fas fa-credit-card"></i></div>Lier carte</a>
        <a href="#" class="service-item"><div class="service-icon"><i class="fas fa-key"></i></div>Sécurité</a>
        <a href="taches.html" class="service-item"><div class="service-icon"><i class="fas fa-gift"></i></div>Cadeau</a>
        <div onclick="logout()" class="service-item"><div class="service-icon" style="color: #e74c3c;"><i class="fas fa-sign-out-alt"></i></div>Quitter</div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home nav-icon"></i>Accueil</a>
        <a href="produit.html" class="nav-item"><i class="fas fa-box nav-icon"></i>Produit</a>
        <a href="equipe.html" class="nav-item"><i class="fas fa-users nav-icon"></i>Équipe</a>
        <a href="profil.html" class="nav-item active"><i class="fas fa-user nav-icon"></i>Moi</a>
    </nav>

    <script>
        // URL DB mise à jour pour First Traders
        const dbUrl = "https://first-traders-default-rtdb.firebaseio.com/users";
        const userPhone = localStorage.getItem('userPhone');

        // Sécurité : redirection si non connecté
        if (!userPhone) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('displayPhone').innerText = userPhone;
        }

        async function loadProfileData() {
            try {
                const response = await fetch(`${dbUrl}.json`);
                const users = await response.json();
                
                let currentUser = null;
                let userId = null;

                for (let id in users) {
                    if (users[id].phone === userPhone) {
                        userId = id;
                        currentUser = users[id];
                        break;
                    }
                }

                if (currentUser) {
                    // Mise à jour des textes
                    document.getElementById('walletBalance').innerText = (currentUser.balance || 0).toLocaleString() + " FC";
                    document.getElementById('walletEarnings').innerText = (currentUser.earnings || 0).toLocaleString() + " FC";
                    
                    // Déterminer le VIP en fonction des achats (Arborescence mise à jour également)
                    const prodRes = await fetch(`https://first-traders-default-rtdb.firebaseio.com/purchases/${userId}.json`);
                    const products = await prodRes.json();
                    if (products) {
                        const count = Object.keys(products).length;
                        document.getElementById('displayVIP').innerText = "VIP " + count;
                    }
                }
            } catch (error) {
                console.error("Erreur de chargement du profil.");
            }
        }

        function logout() {
            if (confirm("Voulez-vous vraiment vous déconnecter ?")) {
                localStorage.removeItem('userPhone');
                localStorage.removeItem('isLoggedIn');
                window.location.href = 'index.html';
            }
        }

        // Initialisation
        loadProfileData();
    </script>

</body>
</html>
