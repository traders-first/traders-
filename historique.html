<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Traders - Historique</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { margin: 0; background-color: #f8f8f8; color: #000; }

        .header { background: #00A651; color: #fff; padding: 20px; display: flex; align-items: center; gap: 15px; }
        .header a { color: #fff; text-decoration: none; font-size: 20px; }
        .header h1 { margin: 0; font-size: 18px; }

        /* Système d'onglets */
        .tabs {
            display: flex;
            background: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            font-size: 14px;
            font-weight: bold;
            color: #888;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .tab-item.active {
            color: #00A651;
            border-bottom-color: #00A651;
        }

        .content-section { padding: 15px; display: none; min-height: 300px; }
        .content-section.active { display: block; }

        /* État vide */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #bbb;
        }
        .empty-state i { 
            font-size: 60px; 
            margin-bottom: 20px; 
            display: block; 
            color: #ddd;
        }
        .empty-state p { 
            font-size: 14px; 
            margin: 0;
            font-weight: 500;
        }

        /* Liste des transactions */
        .tx-card {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #eee;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .tx-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .tx-amount { font-size: 16px; font-weight: bold; color: #00A651; }
        .tx-amount.minus { color: #e74c3c; }
        
        .tx-status {
            font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 20px; text-transform: uppercase;
        }
        /* Gestion complète de tous les statuts possibles de la DB */
        .status-en_attente { background: #fef9e7; color: #f39c12; }
        .status-valide { background: #e8f8f5; color: #2ecc71; }
        .status-paye { background: #e8f8f5; color: #2ecc71; }
        .status-refuse { background: #fce4d6; color: #e74c3c; }
        .status-rejete { background: #fce4d6; color: #e74c3c; }
        
        .tx-details { font-size: 12px; color: #666; line-height: 1.5; }
        .tx-date { font-size: 11px; color: #999; text-align: right; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="profil.html"><i class="fas fa-arrow-left"></i></a>
        <h1>Mes Historiques</h1>
    </div>

    <div class="tabs">
        <div class="tab-item active" onclick="openTab(event, 'recharges')">Recharges</div>
        <div class="tab-item" onclick="openTab(event, 'retraits')">Retraits</div>
    </div>

    <div id="recharges" class="content-section active">
        <div class="empty-state">
            <i class="fas fa-file-invoice-dollar"></i>
            <p>Aucune recharge effectuée pour le moment.</p>
        </div>
    </div>

    <div id="retraits" class="content-section">
        <div class="empty-state">
            <i class="fas fa-hand-holding-usd"></i>
            <p>Votre historique de retrait est vide.</p>
        </div>
    </div>

    <script>
        const mainBaseUrl = "https://canal-e4274-default-rtdb.firebaseio.com";
        const userPhone = localStorage.getItem('userPhone');

        if (!userPhone) { window.location.href = 'index.html'; }

        function openTab(evt, tabName) {
            var i, content, tabs;
            content = document.getElementsByClassName("content-section");
            for (i = 0; i < content.length; i++) {
                content[i].classList.remove("active");
            }
            tabs = document.getElementsByClassName("tab-item");
            for (i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove("active");
            }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // Fonction pour formater proprement le texte d'affichage du statut
        function getStatusLabel(status) {
            if (!status) return "En attente";
            const s = status.toLowerCase();
            if (s === "en_attente") return "En attente";
            if (s === "valide") return "Validé";
            if (s === "paye") return "Payé";
            if (s === "refuse" || s === "rejete") return "Refusé";
            return status;
        }

        // Fonction pour normaliser la classe CSS du statut
        function getStatusClass(status) {
            if (!status) return "en_attente";
            const s = status.toLowerCase();
            if (s === "valide" || s === "paye") return s;
            if (s === "refuse" || s === "rejete") return "refuse";
            return "en_attente";
        }

        async function fetchHistory() {
            try {
                // 1. CHARGER LES RECHARGES
                const rechargeRes = await fetch(`${mainBaseUrl}/recharges_en_attente.json`);
                const rechargesData = await rechargeRes.json();
                const rechargesContainer = document.getElementById('recharges');
                
                let rechargesHtml = "";
                let hasRecharges = false;

                if (rechargesData) {
                    for (let id in rechargesData) {
                        const item = rechargesData[id];
                        // Vérification sur userAccount ou user
                        if (item.userAccount === userPhone || item.user === userPhone) {
                            hasRecharges = true;
                            const currentStatus = item.status || "en_attente";
                            
                            rechargesHtml += `
                                <div class="tx-card">
                                    <div class="tx-header">
                                        <span class="tx-amount">+ ${(item.amount || 0).toLocaleString()} FC</span>
                                        <span class="tx-status status-${getStatusClass(currentStatus)}">${getStatusLabel(currentStatus)}</span>
                                    </div>
                                    <div class="tx-details">
                                        <strong>Réseau :</strong> ${item.network || "Inconnu"}<br>
                                        <strong>TID :</strong> ${item.transactionID || "N/A"}<br>
                                        <strong>Expéditeur :</strong> ${item.senderPhone || "N/A"}
                                    </div>
                                    <div class="tx-date">${item.date || ""}</div>
                                </div>
                            `;
                        }
                    }
                }
                if (hasRecharges) { rechargesContainer.innerHTML = rechargesHtml; }


                // 2. CHARGER LES RETRAITS
                const retraitRes = await fetch(`${mainBaseUrl}/retraits.json`);
                const retraitsData = await retraitRes.json();
                const retraitsContainer = document.getElementById('retraits');

                let retraitsHtml = "";
                let hasRetraits = false;

                if (retraitsData) {
                    for (let id in retraitsData) {
                        const item = retraitsData[id];
                        // Vérification sur userAccount ou user
                        if (item.userAccount === userPhone || item.user === userPhone) {
                            hasRetraits = true;
                            const currentStatus = item.status || "en_attente";

                            retraitsHtml += `
                                <div class="tx-card">
                                    <div class="tx-header">
                                        <span class="tx-amount minus">- ${(item.amount || 0).toLocaleString()} FC</span>
                                        <span class="tx-status status-${getStatusClass(currentStatus)}">${getStatusLabel(currentStatus)}</span>
                                    </div>
                                    <div class="tx-details">
                                        <strong>Réseau :</strong> ${item.network || "Mobile Money"}<br>
                                        <strong>Destinataire :</strong> ${item.receiverPhone || item.receiver || "N/A"}
                                    </div>
                                    <div class="tx-date">${item.date || ""}</div>
                                </div>
                            `;
                        }
                    }
                }
                if (hasRetraits) { retraitsContainer.innerHTML = retraitsHtml; }

            } catch (error) {
                console.error("Erreur lors de la récupération des historiques :", error);
            }
        }

        // Lancement au chargement de la page
        fetchHistory();
    </script>
</body>
</html>
